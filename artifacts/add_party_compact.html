<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Party | Lumen Ledger</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#e1e3e4",
                    "surface": "#f8f9fa",
                    "surface-tint": "#006e2d",
                    "primary": "#006e2d",
                    "on-primary-container": "#004118",
                    "inverse-primary": "#53e076",
                    "error": "#ba1a1a",
                    "surface-container-high": "#e7e8e9",
                    "on-secondary": "#ffffff",
                    "surface-container-highest": "#e1e3e4",
                    "primary-fixed-dim": "#53e076",
                    "outline": "#6d7b6c",
                    "on-secondary-fixed": "#201a1a",
                    "primary-container": "#1db954",
                    "on-secondary-container": "#696161",
                    "inverse-on-surface": "#f0f1f2",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#ff767b",
                    "secondary-fixed": "#ebe0df",
                    "error-container": "#ffdad6",
                    "secondary": "#645d5c",
                    "secondary-container": "#e8dddd",
                    "on-tertiary-container": "#730a1b",
                    "tertiary-fixed-dim": "#ffb3b3",
                    "on-surface-variant": "#3d4a3d",
                    "surface-container-low": "#f3f4f5",
                    "on-primary-fixed": "#002108",
                    "on-secondary-fixed-variant": "#4c4545",
                    "on-primary": "#ffffff",
                    "secondary-fixed-dim": "#cfc4c4",
                    "on-tertiary-fixed-variant": "#881d28",
                    "inverse-surface": "#2e3132",
                    "tertiary-fixed": "#ffdad9",
                    "on-primary-fixed-variant": "#005320",
                    "surface-container-lowest": "#ffffff",
                    "surface-container": "#edeeef",
                    "on-tertiary-fixed": "#400009",
                    "outline-variant": "#bccbb9",
                    "surface-bright": "#f8f9fa",
                    "tertiary": "#a8353e",
                    "background": "#f8f9fa",
                    "surface-dim": "#d9dadb",
                    "primary-fixed": "#72fe8f",
                    "on-error-container": "#93000a",
                    "on-surface": "#191c1d",
                    "on-background": "#191c1d",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "1rem",
                    "3xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope", "sans-serif"],
                    "body": ["Manrope", "sans-serif"],
                    "label": ["Manrope", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; }
        ::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="w-full sticky top-0 z-50 bg-white dark:bg-[#191c1d] flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="text-[#3d4a3d] dark:text-[#bccbb9] hover:bg-[#f3f4f5] dark:hover:bg-[#2a2f30] transition-colors p-2 rounded-full scale-95 active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Manrope'] text-lg font-bold tracking-tight text-[#201a1a] dark:text-[#f8f9fa]">Add Party</h1>
</div>
<button class="text-[#3d4a3d] dark:text-[#bccbb9] hover:bg-[#f3f4f5] dark:hover:bg-[#2a2f30] transition-colors p-2 rounded-full scale-95 active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<main class="pb-32 px-4 pt-4 space-y-4 max-w-lg mx-auto">
<!-- Section: Basic Info -->
<section class="bg-surface-container-lowest rounded-2xl p-4 transition-all border border-outline-variant/15">
<div class="flex items-center justify-between mb-4">
<span class="text-[10px] font-extrabold uppercase tracking-[0.15em] text-secondary">Basic Info</span>
<span class="h-1 w-12 bg-primary-container rounded-full"></span>
</div>
<div class="space-y-3">
<div class="relative group">
<label class="block text-[11px] font-bold text-on-surface-variant mb-1 ml-1">Party Name *</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-2.5 text-sm focus:ring-1 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/50" placeholder="Enter party name" type="text"/>
</div>
<div class="relative group">
<label class="block text-[11px] font-bold text-on-surface-variant mb-1 ml-1">Phone *</label>
<div class="flex gap-2">
<div class="w-20 bg-surface-container-highest rounded-xl flex items-center justify-center text-sm font-semibold text-on-surface-variant">+91</div>
<input class="flex-1 bg-surface-container-highest border-none rounded-xl px-4 py-2.5 text-sm focus:ring-1 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/50" placeholder="Mobile number" type="tel"/>
</div>
</div>
<div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
<div class="relative group">
<label class="block text-[11px] font-bold text-on-surface-variant mb-1 ml-1">Email</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-2.5 text-sm focus:ring-1 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/50" placeholder="Optional" type="email"/>
</div>
<div class="relative group">
<label class="block text-[11px] font-bold text-on-surface-variant mb-1 ml-1">GSTIN</label>
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-2.5 text-sm focus:ring-1 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/50" placeholder="22AAAAA0000A1Z5" type="text"/>
</div>
</div>
</div>
</section>
<!-- Section: Financial Setup -->
<section class="bg-surface-container-lowest rounded-2xl p-4 transition-all border border-outline-variant/15">
<div class="flex items-center justify-between mb-4">
<span class="text-[10px] font-extrabold uppercase tracking-[0.15em] text-secondary">Financial Setup</span>
<span class="material-symbols-outlined text-primary-container text-sm" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<div class="space-y-4">
<!-- Opening Balance -->
<div>
<label class="block text-[11px] font-bold text-on-surface-variant mb-2 ml-1">Opening Balance</label>
<div class="flex items-center gap-3 bg-surface-container-low p-1.5 rounded-2xl">
<input class="flex-1 bg-transparent border-none focus:ring-0 text-lg font-bold px-3 py-1 placeholder:text-outline/30" placeholder="₹ 0.00" type="number"/>
<div class="flex bg-white rounded-xl p-1 shadow-sm border border-outline-variant/5">
<button class="px-4 py-1.5 rounded-lg text-[10px] font-bold bg-primary text-white transition-all">YOU'LL GET</button>
<button class="px-4 py-1.5 rounded-lg text-[10px] font-bold text-on-surface-variant hover:bg-surface-container-high transition-all">YOU'LL GIVE</button>
</div>
</div>
</div>
<!-- Credit Limit -->
<div class="flex items-center justify-between py-2 px-1">
<div class="flex flex-col">
<span class="text-sm font-bold text-on-surface">Enable Credit Limit</span>
<span class="text-[10px] text-secondary font-medium">Control exposure for this party</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-2.5 text-sm focus:ring-1 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" placeholder="Set credit limit amount" type="number"/>
</div>
<!-- Payment Terms -->
<div>
<label class="block text-[11px] font-bold text-on-surface-variant mb-2 ml-1">Payment Terms (Days)</label>
<div class="grid grid-cols-4 gap-2">
<button class="py-2 bg-primary text-white rounded-xl text-xs font-bold border border-primary transition-all">7</button>
<button class="py-2 bg-surface-container-low text-on-surface-variant rounded-xl text-xs font-bold border border-transparent hover:bg-surface-container-high transition-all">15</button>
<button class="py-2 bg-surface-container-low text-on-surface-variant rounded-xl text-xs font-bold border border-transparent hover:bg-surface-container-high transition-all">30</button>
<button class="py-2 bg-surface-container-low text-on-surface-variant rounded-xl text-xs font-bold border border-transparent hover:bg-surface-container-high transition-all">Custom</button>
</div>
</div>
</div>
</section>
<!-- Section: Address -->
<section class="bg-surface-container-lowest rounded-2xl p-4 transition-all border border-outline-variant/15">
<div class="flex items-center justify-between mb-4">
<span class="text-[10px] font-extrabold uppercase tracking-[0.15em] text-secondary">Location &amp; Logistics</span>
<span class="material-symbols-outlined text-primary-container text-sm" data-icon="location_on">location_on</span>
</div>
<div class="space-y-4">
<div class="relative group">
<label class="block text-[11px] font-bold text-on-surface-variant mb-1 ml-1">Billing Address</label>
<textarea class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-2.5 text-sm focus:ring-1 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all resize-none placeholder:text-outline/50" placeholder="Street name, building, area..." rows="3"></textarea>
</div>
<div class="flex items-center gap-3 p-1">
<div class="w-5 h-5 bg-primary-container rounded flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-white" data-icon="check" data-weight="fill">check</span>
</div>
<span class="text-xs font-semibold text-on-surface-variant">Shipping address is same as billing</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar as a Sticky Action Shell -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-6 py-4 pb-8 bg-white/80 dark:bg-[#191c1d]/80 backdrop-blur-xl z-50 rounded-t-3xl shadow-[0px_-12px_32px_rgba(25,28,29,0.06)] border-t border-[#bccbb9]/15">
<button class="flex flex-col items-center justify-center text-[#3d4a3d] dark:text-[#bccbb9] px-6 py-3 hover:scale-105 transition-transform scale-102 active:scale-98">
<span class="material-symbols-outlined mb-1" data-icon="close">close</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Discard</span>
</button>
<button class="flex flex-col items-center justify-center bg-gradient-to-br from-[#006e2d] to-[#1db954] text-white rounded-xl px-8 py-3 mx-2 hover:scale-105 transition-transform scale-102 active:scale-98 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined mb-1" data-icon="check_circle" data-weight="fill">check_circle</span>
<span class="font-['Manrope'] text-[11px] font-semibold uppercase tracking-wider">Save Party</span>
</button>
</nav>
<!-- Floating Background Decor for Editorial Feel -->
<div class="fixed top-20 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-[80px] -z-10 pointer-events-none"></div>
<div class="fixed bottom-40 -left-20 w-80 h-80 bg-primary-container/5 rounded-full blur-[100px] -z-10 pointer-events-none"></div>
</body></html>
